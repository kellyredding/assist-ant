name: AssistAntApp
options:
  bundleIdPrefix: com.kellyredding
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.2"

packages:
  Galactic:
    url: https://github.com/kellyredding/Galactic.git
    exactVersion: 0.1.5
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    exactVersion: 7.5.0

targets:
  AssistAntApp:
    type: application
    platform: macOS
    sources:
      - AssistAntApp
    dependencies:
      - package: Galactic
        product: Galactic
      - package: GRDB
        product: GRDB
    info:
      path: AssistAntApp/Info.plist
      properties:
        CFBundleName: "Assist Ant"
        CFBundleDisplayName: "Assist Ant"
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHighResolutionCapable: true
        CFBundleIconName: AppIcon
        # NB: NOT LSUIElement=true. The app toggles
        # NSApp.setActivationPolicy(.accessory) <-> .regular at
        # runtime so the dock icon appears only while a window
        # is open.
    settings:
      base:
        # The bundle wrapper is "Assist Ant.app" (the user-facing name the
        # Dock, ⌘-Tab switcher, and Spotlight key off the .app filename),
        # but the Mach-O executable stays "AssistAnt" — no space — so
        # process matching and scripts don't have to quote it. The bundle
        # identifier is unchanged, so settings and permissions persist.
        PRODUCT_NAME: "Assist Ant"
        EXECUTABLE_NAME: AssistAnt
        PRODUCT_BUNDLE_IDENTIFIER: com.kellyredding.AssistAnt
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # Sandboxed smoke-test runner: a plain command-line tool that compiles the
  # items model + store (no app, no AppKit, no sockets) and exercises them
  # against an in-memory database + a temp file. Run via `make smoke`.
  ItemsSmoke:
    type: tool
    platform: macOS
    sources:
      - AssistAntApp/Models/Items
      - AssistAntApp/Models/Paths.swift
      - ItemsSmoke
    dependencies:
      - package: GRDB
        product: GRDB
    settings:
      base:
        SWIFT_VERSION: "5.10"
